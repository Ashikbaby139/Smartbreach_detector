<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"/>
  <title>SecureSense - Breach Images</title>
  <style>
    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      background: radial-gradient(circle at top, #0f2027, #203a43, #2c5364);
      color: #f2f2f2;
      margin: 0;
      padding: 20px;
      text-align: center;
    }

    h1 {
      color: #00e0ff;
      text-shadow: 0 0 20px rgba(0, 224, 255, 0.8);
      margin-bottom: 20px;
    }

    .gallery {
      display: flex;
      flex-wrap: wrap;
      justify-content: center;
      gap: 20px;
    }

    .card {
      background: rgba(255, 255, 255, 0.1);
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0, 224, 255, 0.2);
      overflow: hidden;
      width: 250px;
      transition: transform 0.3s;
    }

    .card:hover {
      transform: scale(1.05);
    }

    img {
      width: 100%;
      height: 200px;
      object-fit: cover;
      border-bottom: 2px solid #00e0ff;
    }

    p {
      margin: 10px;
      font-size: 0.9em;
      color: #ccc;
    }

    form {
      margin-bottom: 10px;
    }

    .delete-btn {
      background: linear-gradient(90deg, #ff4b2b, #ff416c);
      border: none;
      color: white;
      padding: 8px 15px;
      border-radius: 25px;
      font-weight: bold;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(255, 65, 108, 0.4);
      transition: all 0.3s;
    }

    .delete-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 15px rgba(255, 65, 108, 0.8);
    }

    .back-btn {
      display: inline-block;
      margin-top: 20px;
      padding: 10px 20px;
      background: linear-gradient(90deg, #00e0ff, #00ff88);
      color: #0f2027;
      border: none;
      border-radius: 30px;
      font-weight: bold;
      text-decoration: none;
      box-shadow: 0 0 10px rgba(0, 224, 255, 0.6);
      transition: transform 0.3s;
    }

    .back-btn:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px rgba(0, 255, 136, 0.8);
    }
  </style>
</head>

<body>
  <h1> Breach Snapshots</h1>

  {% if images %}
  <div class="gallery">
    {% for img in images %}
    <div class="card">
      <img src="{{ url_for('static', filename='snapshots/' + img) }}" alt="Breach Image">
      <p>{{ img }}</p>

      <form action="{{ url_for('delete_breach', filename=img) }}" method="POST" onsubmit="return confirm('Delete this image?');">
        <button type="submit" class="delete-btn">Delete</button>
      </form>
    </div>
    {% endfor %}
  </div>
  {% else %}
  <p>No breach images captured </p>
  {% endif %}

  <a href="/" class="back-btn">⬅ Back to Home</a>
</body>
</html>
